# site properties and page defaults
title: Sakaiza Rajery
subtitle: Doctoral student in Human Medical Genetics & Genomics
description: Currently researching how machine learning methods can help extract knowledge from multi-omics data and advance our understanding of autoimmune diseases. Interested in how data-driven health tools are understood and used beyond academia. Exploring how creative practices can serve as a medium for healing.
header: images/background.jpg
footer: images/background.jpg
proofer: false

# site social media and other links
links:
  email: contact@SakaizaRajery.com
  orcid: 0000-0001-8713-9213
  github: SakaizaRajery
  instagram: SakaizaRajery

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff

# configure jekyll spaceship
jekyll-spaceship:
  mathjax-processor:
    src:
      - https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js
